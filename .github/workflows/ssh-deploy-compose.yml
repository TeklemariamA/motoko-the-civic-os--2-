name: Deploy Compose Stack via SSH

on:
  push:
    branches: [main]
    paths:
      - Caddyfile
      - docker-compose.yml
      - Dockerfile
      - frontend/**
      - .github/workflows/ssh-deploy-compose.yml
  workflow_dispatch:
    inputs:
      deploy_branch:
        description: Branch to deploy
        required: false
        default: main
      skip_build:
        description: Skip Docker rebuild (use only for emergency restarts)
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}

    steps:
      - id: check
        name: Check required deploy secrets
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=()

          [ -z "${DEPLOY_HOST:-}" ] && missing+=("DEPLOY_HOST")
          [ -z "${DEPLOY_USER:-}" ] && missing+=("DEPLOY_USER")
          [ -z "${DEPLOY_PATH:-}" ] && missing+=("DEPLOY_PATH")
          [ -z "${DEPLOY_SSH_PRIVATE_KEY:-}" ] && missing+=("DEPLOY_SSH_PRIVATE_KEY")

          if [ ${#missing[@]} -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "::notice title=Deploy Ready::All required SSH deploy secrets are configured."
            {
              echo "### SSH deploy preflight"
              echo "- Status: ready"
              echo "- Required secrets: configured"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning title=Deploy Skipped::Missing secrets: ${missing[*]}"
            {
              echo "### SSH deploy preflight"
              echo "- Status: skipped"
              echo "- Missing secrets: ${missing[*]}"
              echo "- Action: Add repository secrets, then re-run this workflow"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  deploy:
    needs: preflight
    if: ${{ needs.preflight.outputs.ready == 'true' }}
    runs-on: ubuntu-latest
    env:
      DEPLOY_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_branch || github.ref_name }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      SKIP_BUILD: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.skip_build || 'false' }}

    steps:
      - name: Add SSH private key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          set -euo pipefail
          ssh_target_host="$(printf '%s' "$DEPLOY_HOST" | tr -d '\r\n')"
          ssh_target_port="$(printf '%s' "${DEPLOY_PORT:-22}" | tr -d '\r\n')"
          mkdir -p ~/.ssh
          ssh-keyscan -p "$ssh_target_port" -H "$ssh_target_host" >> ~/.ssh/known_hosts || \
            echo "::warning title=Known Hosts::ssh-keyscan failed; proceeding with StrictHostKeyChecking disabled for deploy."

      - name: Deploy on remote host
        run: |
          set -euo pipefail
          ssh_target_host="$(printf '%s' "$DEPLOY_HOST" | tr -d '\r\n')"
          ssh_target_user="$(printf '%s' "$DEPLOY_USER" | tr -d '\r\n')"
          ssh_target_path="$(printf '%s' "$DEPLOY_PATH" | tr -d '\r\n')"
          ssh_target_port="$(printf '%s' "${DEPLOY_PORT:-22}" | tr -d '\r\n')"
          REMOTE_BUILD_CMD='docker compose up -d --build'
          if [ "$SKIP_BUILD" = "true" ]; then
            REMOTE_BUILD_CMD='docker compose up -d'
          fi

          ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -p "$ssh_target_port" "$ssh_target_user@$ssh_target_host" <<EOF
            set -euo pipefail
            cd "$ssh_target_path"

            # Keep deploy host in sync with repository.
            git fetch --all --prune
            git checkout "$DEPLOY_BRANCH"
            git pull origin "$DEPLOY_BRANCH"

            $REMOTE_BUILD_CMD

            echo "Deployment completed on \\$(hostname) at \\$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            docker compose ps
          EOF

  deploy-skipped:
    needs: preflight
    if: ${{ needs.preflight.outputs.ready != 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Skip deploy when secrets are missing
        run: |
          echo "SSH deploy skipped because required secrets are not fully configured."