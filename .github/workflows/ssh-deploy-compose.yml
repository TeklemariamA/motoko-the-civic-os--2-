name: Deploy Compose Stack via SSH

on:
  push:
    branches: [main]
    paths:
      - Caddyfile
      - docker-compose.yml
      - Dockerfile
      - frontend/**
      - .github/workflows/ssh-deploy-compose.yml
  workflow_dispatch:
    inputs:
      deploy_branch:
        description: Branch to deploy
        required: false
        default: main
      skip_build:
        description: Skip Docker rebuild (use only for emergency restarts)
        required: false
        default: 'false'

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_BRANCH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_branch || github.ref_name }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT || '22' }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      SKIP_BUILD: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.skip_build || 'false' }}

    steps:
      - name: Validate required secrets
        run: |
          set -euo pipefail
          missing=0
          for var in DEPLOY_HOST DEPLOY_USER DEPLOY_PATH; do
            if [ -z "${!var:-}" ]; then
              echo "::error title=Missing Secret::Required secret '$var' is not set."
              missing=1
            fi
          done

          if [ -z "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" ]; then
            echo "::error title=Missing Secret::Required secret 'DEPLOY_SSH_PRIVATE_KEY' is not set."
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            echo "One or more required deploy secrets are missing."
            exit 1
          fi

      - name: Add SSH private key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on remote host
        run: |
          set -euo pipefail
          REMOTE_BUILD_CMD='docker compose up -d --build'
          if [ "$SKIP_BUILD" = "true" ]; then
            REMOTE_BUILD_CMD='docker compose up -d'
          fi

          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" <<EOF
            set -euo pipefail
            cd "$DEPLOY_PATH"

            # Keep deploy host in sync with repository.
            git fetch --all --prune
            git checkout "$DEPLOY_BRANCH"
            git pull origin "$DEPLOY_BRANCH"

            $REMOTE_BUILD_CMD

            echo "Deployment completed on \\$(hostname) at \\$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            docker compose ps
          EOF