# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    - name: Install dfx (Internet Computer SDK)
      run: |
        DFXVM_INIT_YES=true DFX_VERSION=0.24.3 sh -ci "$(curl -fsSL https://internetcomputer.org/install.sh)"
        echo "$HOME/.local/share/dfx/bin" >> $GITHUB_PATH
    
    - name: Install mops (Motoko package manager)
      run: npm install -g ic-mops
    
    - name: Install project dependencies
      run: npm ci
    
    - name: Install Motoko dependencies
      run: mops install
    
    - name: Build project
      run: npm run build --if-present
    
    - name: Run tests
      run: npm test --if-present

  e2e:

    runs-on: ubuntu-latest
    needs: build

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install project dependencies
      run: npm ci

    - name: Install Playwright (browsers + deps)
      run: npx playwright install --with-deps chromium

    - name: Build frontend
      run: npm run build --workspace frontend

    - name: Start preview server
      run: |
        npm run preview --workspace frontend -- --host 0.0.0.0 --port 5173 > /tmp/vite-preview.log 2>&1 &
        echo $! > /tmp/vite-preview.pid

    - name: Wait for preview
      run: timeout 60s bash -c 'until curl -sSf http://127.0.0.1:5173 > /dev/null; do sleep 2; done'

    - name: Run Playwright tests
      env:
        BASE_URL: http://127.0.0.1:5173
      run: npm run test:e2e --workspace frontend

    - name: Show preview logs on failure
      if: failure()
      run: cat /tmp/vite-preview.log

    - name: Stop preview server
      if: always()
      run: |
        if [ -f /tmp/vite-preview.pid ]; then
          kill $(cat /tmp/vite-preview.pid) || true
        fi
