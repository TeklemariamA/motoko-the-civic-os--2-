name: Deploy frontend to Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  administration: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install project dependencies
        run: npm ci

      - name: Create backend declarations stub for static deployment
        run: |
          mkdir -p src/declarations/backend
          cat > src/declarations/backend/index.js << 'STUB'
          // Static deployment stub – the Internet Computer backend canister is not
          // available in this GitHub Pages deployment.
          // For full functionality, deploy via `dfx deploy --network ic`.
          export const canisterId = '';
          export const backend = {
            chat:            async () => { throw new Error('not configured'); },
            createBounty:    async () => { throw new Error('not configured'); },
            getBountyValue:  async () => [],
            privateAction:   async () => { throw new Error('not configured'); },
            publicLog:       async () => [],
            fileCase:        async () => { throw new Error('not configured'); },
            castVerdict:     async () => [],
            enrollMember:    async () => { throw new Error('not configured'); },
            getMember:       async () => [],
            listMembers:     async () => [],
            commitSkill:     async () => [],
            endorseSkill:    async () => [],
            listSkillCommits:async () => [],
            publishResearch: async () => { throw new Error('not configured'); },
            listResearch:    async () => [],
            proposeBill:     async () => { throw new Error('not configured'); },
            castVote:        async () => [],
            forkBill:        async () => [],
            listBills:       async () => [],
          };
          STUB

      - name: Build production assets
        working-directory: frontend
        run: ../node_modules/.bin/vite build

      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
