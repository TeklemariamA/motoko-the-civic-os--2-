name: Deploy to Hostinger VPS

# Runs after the Docker image is built and pushed to GHCR.
# SSHes into the Hostinger VPS (Ubuntu 24.04, IP 72.61.96.166), pulls the new
# image, and restarts the container so that civic-os-opensourcism.cloud always
# serves the latest build.
#
# VPS details (non-sensitive – hardcoded below):
#   host     : 72.61.96.166
#   username : root
#
# ── Required repository secret (Settings → Secrets → Actions) ───────────────
#   VPS_SSH_KEY
#     The COMPLETE contents of the private key file, including the header and
#     footer lines.  The value MUST start with exactly:
#       -----BEGIN OPENSSH PRIVATE KEY-----
#     and end with:
#       -----END OPENSSH PRIVATE KEY-----
#     (five dashes on each side – copy the file with `cat ~/.ssh/id_ed25519`)
#
#     ⚠  Recommendation: generate a dedicated unencrypted deploy key so that
#        no passphrase is needed:
#          ssh-keygen -t ed25519 -C "github-actions-deploy" \
#            -f ~/.ssh/civic_os_deploy -N ""
#        Then copy the PUBLIC key to the VPS:
#          ssh-copy-id -i ~/.ssh/civic_os_deploy.pub root@72.61.96.166
#        And paste the PRIVATE key into the VPS_SSH_KEY secret.
#
# ── Optional secrets ─────────────────────────────────────────────────────────
#   VPS_KEY_PASSPHRASE
#     If your private key IS passphrase-protected, store the passphrase here.
#     Leave unset (or empty) when using an unencrypted key.
#
#   GHCR_TOKEN
#     GitHub PAT with read:packages scope – only needed if the GHCR package
#     visibility is set to Private.

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  # civic-os-opensourcism.cloud – Hostinger KVM VPS, Ubuntu 24.04
  VPS_HOST: 72.61.96.166
  VPS_USER: root
  # Sanitized image name: ghcr.io/teklemariama/motoko-the-civic-os-2:latest
  IMAGE: ghcr.io/teklemariama/motoko-the-civic-os-2:latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Only deploy when the upstream docker-push workflow succeeded
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2  # v1.2.5
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          passphrase: ${{ secrets.VPS_KEY_PASSPHRASE }}
          envs: IMAGE,GHCR_TOKEN
          script: |
            set -e

            # Log in to GHCR if a token was supplied (required for private packages)
            if [ -n "$GHCR_TOKEN" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u github-actions --password-stdin
            fi

            echo "Pulling latest image: $IMAGE"
            docker pull "$IMAGE"

            echo "Stopping old container (if running)..."
            docker stop civic-os 2>/dev/null || true
            docker rm   civic-os 2>/dev/null || true

            echo "Starting new container on port 80..."
            docker run -d \
              --name civic-os \
              --restart unless-stopped \
              -p 80:8000 \
              "$IMAGE"

            echo "Removing dangling images..."
            docker image prune -f

            echo "Deployment complete – civic-os-opensourcism.cloud is live."
