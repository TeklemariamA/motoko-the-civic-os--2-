services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: civicos-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Required: a real backend canister ID for the selected network.
      CANISTER_ID_BACKEND: ${CANISTER_ID_BACKEND:?Set CANISTER_ID_BACKEND in .env or shell env}
      DFX_NETWORK: ${DFX_NETWORK:-ic}
      IC_HOST: ${IC_HOST:-}
      ENABLE_CHATBOT: ${ENABLE_CHATBOT:-false}
    ports:
      - "[::]:8080:80"

  caddy:
    image: caddy:2-alpine
    container_name: civicos-caddy
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - civicos_caddy_data:/data
      - civicos_caddy_config:/config
    restart: unless-stopped

volumes:
  civicos_caddy_data:
  civicos_caddy_config:
