canisters:
  - name: backend
    recipe:
      type: "@dfinity/motoko@v4.1.0"
      configuration:
        main: backend/app.mo
        args: "--enhanced-orthogonal-persistence"
      
  - name: frontend
    dependencies:
      - backend
    recipe:
      type: "@dfinity/assets@v0.1.0"
      configuration:
        entrypoint: frontend/index.html
        source:
          - frontend/dist

defaults:
  build:
    packtool: mops sources
networks:
  - name: local
    mode: managed
    ii: true
